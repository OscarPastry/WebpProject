version: '3.8'

services:
  db:
    image: postgres:15
    container_name: flavorforge_db
    environment:
      POSTGRES_USER: flavorforge
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flavorforge_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
